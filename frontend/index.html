<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="TermoSync NOC | Centro de Operações e Telemetria IoT" />
    
    <title>TermoSync</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        background-color: #020617; /* Fundo Escuro NOC */
        color: #38bdf8;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
      }
      .boot-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 60%);
      }
      .boot-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(56, 189, 248, 0.1);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: bootSpin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
      }
      .boot-text {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        animation: bootPulse 1.5s infinite;
        color: #94a3b8;
      }
      @keyframes bootSpin {
        100% { transform: rotate(360deg); }
      }
      @keyframes bootPulse {
        0%, 100% { opacity: 1; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); color: #38bdf8;}
        50% { opacity: 0.4; text-shadow: none; color: #94a3b8;}
      }
    </style>
  </head>
  
  <body>
    <script>
      if (localStorage.getItem('theme') !== 'light') {
        document.documentElement.classList.add('dark-theme');
        document.body.classList.add('dark-theme');
      }
    </script>

    <div id="root">
      <div class="boot-screen">
        <div class="boot-spinner"></div>
        <div class="boot-text">A Iniciar Núcleo NOC...</div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
